# Computational Serendipity Configuration

heartbeat:
  min_minutes: 1
  max_minutes: 10
  creative_threshold: 0.55  # novelty above this triggers full creative pipeline; below = casual observation
  adaptive: true            # speed up when novelty is high, slow down when static
  fast_min: 1.0             # range when lots is happening (high novelty)
  fast_max: 3.0
  slow_min: 7.0             # range when nothing's changing (low novelty)
  slow_max: 15.0

input_pipeline:
  vision:
    enabled: true
    device_index: null      # null = system default. Run --devices to see available cameras
    history_window: 10
    base_weight: 0.35
    min_novelty_for_description: 0.3

  audio:
    enabled: true
    device_index: null      # null = system default. Run --devices to see available microphones
    capture_seconds: 2.0
    vad_threshold: 0.003    # lower = more sensitive to quiet speech
    base_weight_direct: 1.0
    base_weight_overheard: 0.25
    wake_word: "Hey Serendipity"

  screen:
    enabled: true
    base_weight: 0.30         # how much screen context matters relative to other channels
    history_window: 10
    screenshot_enabled: true  # use GPT-4o-mini vision on screenshot when title is novel
    min_novelty_for_screenshot: 0.5
    excluded_apps: []         # window titles containing these are ignored (privacy)
    excluded_urls: []         # browser tab titles containing these are ignored

  text:
    enabled: true
    history_window: 10
    base_weight: 0.40
    excluded_apps: []
    excluded_urls: []

  novelty:
    skip_threshold: 0.15
    decay_rate: 0.95

embeddings:
  provider: "openai"              # "openai", "local" (sentence-transformers), or "auto"
  openai_model: "text-embedding-3-small"
  local_model: "all-MiniLM-L6-v2"
  cache_enabled: true             # cache vectors so same topic is never embedded twice

association_tree:
  branching_factor: 3
  min_depth: 4
  max_depth: 7
  min_domain_crossings: 1
  early_stop_distance: 0.8

scoring:
  weights:
    semantic_distance: 0.30
    domain_crossings: 0.25
    surprise: 0.20
    bridgeability: 0.15
    novelty: 0.10
  fire_threshold: 0.45
  incubation_threshold: 0.30
  incubation_max_reevaluations: 5
  incubation_max_age_hours: 24

voice:
  enabled: true
  model: "tts-1"         # "tts-1" (fast, low latency) or "tts-1-hd" (higher quality)
  voice: "nova"          # alloy, echo, fable, onyx, nova, shimmer
  speed: 1.0             # 0.25 (slow) to 4.0 (fast) — 1.0 is natural

git:
  enabled: true
  poll_interval_seconds: 30   # how often to check for new commits
  max_diff_chars: 4000        # truncate large diffs to keep LLM context manageable
  repo_path: "."              # path to git repo (. = current directory)

output:
  max_interjection_sentences: 3
  rate_limit_per_cycle: 1

llm:
  provider: null     # to be configured: openai, anthropic, etc.
  model: null        # to be configured
  api_key_env: null  # environment variable name holding API key

search:
  provider: null     # to be configured: tavily, serpapi, brave
  api_key_env: null
  results_per_query: 5

memory:
  enabled: true
  persist_directory: "data/memory"   # where ChromaDB stores your long-term memory
  collection_name: "creativity_chains"
  rescore_interval_minutes: 60       # how often to re-evaluate incubating ideas
  max_age_hours: 24                  # incubating ideas expire after this long
  max_rescores: 5                    # max times an idea gets re-evaluated
  profile_rebuild_every: 10          # rebuild personality profile every N ratings

# ── Deep Thought Mode ────────────────────────────────────────────────
# Butterfly-effect discovery engine. Instead of one chain per heartbeat,
# generates parallel chains from multiple seeds and detects "collision points"
# where independent causal threads share hidden intermediate concepts.
# This is computational LSD: hyper-connectivity between normally separate
# concept networks, producing hypotheses no human mind could trace alone.
#
# Activate via CLI:  python -m src.main --live --mode deep_thought
# Or set creativity_mode below.

creativity_mode: "normal"  # "normal" = friendly creative companion, "deep_thought" = oracle mode

deep_thought:
  enabled: false                     # set true (or use --mode deep_thought) to activate
  parallel_seeds: 5                  # independent chains generated per heartbeat
  max_depth: 15                      # chain depth (vs 7 in normal). Up to 30 for ultimate questions
  keep_per_level: 5                  # wider exploration at each depth
  min_domain_crossings: 4            # force more boundary-crossing than normal mode (1)
  collision_threshold: 0.82          # cosine similarity to detect bisociation points
  cross_temporal_enabled: true       # check new chains against old memory for time-gap collisions
  cross_temporal_min_age_hours: 24   # only collide with chains older than this
  invert_efficiency: true            # reward MORE hops (opposite of Kenett efficiency)
  llm_temperature_boost: 0.2        # added to base temperature for Deep Thought hops

  scoring_weights:                   # collision scoring (replaces normal 5-metric scoring)
    causal_depth: 0.20               # more invisible causation = more magical
    seed_distance: 0.20              # farther apart seeds = more surprising collision
    hiddenness: 0.15                 # collision buried in middle = more hidden
    domain_span: 0.15                # more domain boundaries crossed = more creative
    mechanism_specificity: 0.15      # real causal mechanism = more grounded
    testability: 0.15                # actionable hypothesis = more useful
